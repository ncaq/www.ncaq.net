<script defer="defer" src="https://cse.google.com/cse.js?cx=004447714709742723527:gfxoo7p4yao"></script>
<div class="gcse-search"></div>

<section>
  <h1>直近5記事</h1>
  $for(entry)$
  <a href="$url$">
    <section>
      <header>
        <time datetime="$date$">$date$</time>
        $if(updated)$ :
        <time datetime="$updated$">$updated$</time>
        $endif$
      </header>
      <h2>$title$</h2>
      <p>$teaser$</p>
    </section>
  </a>
  $endfor$
</section>

<section>
  <h1>年度別記事一覧</h1>
  <ol>
    $for(entry-index)$
    <a href="/$body$/">$body$年</a>
    $endfor$
  </ol>
</section>
